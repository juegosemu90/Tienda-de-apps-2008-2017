<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a4f8c">
  <title>App Store</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
  <script type="module" src="./main.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="navbar__back" id="backBtn" type="button">◂ Atrás</button>
    <h1 class="navbar__title" id="navTitle">Destacados</h1>
  </nav>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-inner">

      <section class="screen active" id="screen-featured"></section>

      <section class="screen" id="screen-categories"></section>

      <section class="screen" id="screen-top25">
        <div class="segment-wrap">
          <div class="segment">
            <button class="segment__btn active" id="top25-btn-paid" type="button">De pago</button>
            <button class="segment__btn"        id="top25-btn-free" type="button">Gratis</button>
          </div>
        </div>
        <div id="top25-paid"></div>
        <div id="top25-free" style="display:none"></div>
      </section>

      <section class="screen" id="screen-search">
        <div class="search-wrap">
          <div class="search-field">
            <svg class="search-field__icon" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="5"/>
              <line x1="10.5" y1="10.5" x2="15" y2="15" stroke-linecap="round"/>
            </svg>
            <input class="search-field__input" id="searchInput" type="search"
                   placeholder="Buscar en App Store"
                   autocomplete="off" autocorrect="off" spellcheck="false">
          </div>
          <button class="search-cancel" id="searchCancel" type="button">Cancelar</button>
        </div>
        <div id="searchResults"></div>
      </section>

      <section class="screen" id="screen-updates">
        <div class="updates-bar">
          <span class="updates-bar__date">Última comprobación: Hoy</span>
          <button class="btn-update-all" id="updates-btn-all" type="button">Actualizar todo</button>
        </div>
        <div id="updates-body"></div>
      </section>

    </div>
  </div>

  <!-- TABBAR -->
  <nav class="tabbar">

    <button class="tab active" id="tab-featured" onclick="switchTab('featured')" type="button">
      <svg class="tab__icon" viewBox="0 0 24 24">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      </svg>
      <span class="tab__label">Destacados</span>
    </button>

    <button class="tab" id="tab-categories" onclick="switchTab('categories')" type="button">
      <svg class="tab__icon" viewBox="0 0 24 24">
        <rect x="3"  y="3"  width="7" height="7" rx="1"/>
        <rect x="14" y="3"  width="7" height="7" rx="1"/>
        <rect x="3"  y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="tab__label">Categorías</span>
    </button>

    <button class="tab" id="tab-top25" onclick="switchTab('top25')" type="button">
      <svg class="tab__icon" viewBox="0 0 24 24">
        <rect x="4"  y="10" width="3" height="11" rx="1"/>
        <rect x="10" y="5"  width="3" height="16" rx="1"/>
        <rect x="16" y="13" width="3" height="8"  rx="1"/>
      </svg>
      <span class="tab__label">Top 25</span>
    </button>

    <button class="tab" id="tab-search" onclick="switchTab('search')" type="button">
      <svg class="tab__icon tab__icon--stroke" viewBox="0 0 24 24">
        <circle cx="10.5" cy="10.5" r="6.5"/>
        <line x1="15.5" y1="15.5" x2="21" y2="21"/>
      </svg>
      <span class="tab__label">Buscar</span>
    </button>

    <button class="tab" id="tab-updates" onclick="switchTab('updates')" type="button">
      <svg class="tab__icon" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="tab__label">Actualizaciones</span>
    </button>

  </nav>

</body>
</html>
